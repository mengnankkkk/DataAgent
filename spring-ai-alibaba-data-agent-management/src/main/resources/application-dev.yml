server:
  port: 8065

# 使用 H2 内存数据库进行开发测试
spring:
  datasource:
    url: jdbc:h2:mem:data_agent_dev;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=true;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    username: root
    password: root
    driver-class-name: org.h2.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  # H2 控制台配置
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # SQL 初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/h2/schema-h2.sql
      data-locations: classpath:sql/h2/data-h2.sql
      continue-on-error: true
      separator: ;
      encoding: utf-8

  # AI 配置
  ai:
    vectorstore:
      type: simple

    dashscope:
      api-key: sk-41fba53ce58c4718a860ca70db5bf6ac
      chat:
        enabled: true
        options:
          model: qwen-plus
      embedding:
        enabled: true
        options:
          model: text-embedding-v4

    alibaba:
      nl2sql:
        llm-service-type: stream
        code-executor:
          code-pool-executor: local
        file:
          type: local
          path-prefix: data-agent
          path: ./uploads
          url-prefix: /uploads
          imageSize: 2097152

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 日志配置
logging:
  level:
    com.alibaba.cloud.ai.mapper: debug
    org.springframework.jdbc: debug
    org.springframework.web: info
    com.alibaba.cloud.ai: debug
